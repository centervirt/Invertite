##############################################################
# INVERTITE — Configuración Nginx para VPS (mismo servidor)
# Frontend: build estático en /var/www/invertite/dist
# Backend:  Node.js corriendo en localhost:3005
##############################################################

# ── Servidor HTTP (redirige a HTTPS) ─────────────────────────
server {
    listen 80;
    server_name TU_DOMINIO_O_IP;   # ← Reemplazá con tu IP o dominio

    # Redirigir todo a HTTPS si tenés SSL, de lo contrario comentar y usar solo HTTP
    # return 301 https://$host$request_uri;

    # ── Si no tenés SSL, servir directamente por HTTP ──
    root /var/www/invertite/dist;
    index index.html;

    # Límite de tamaño de headers (para evitar RequestHeaderSectionTooLarge en proxies)
    large_client_header_buffers 4 16k;
    client_header_buffer_size   4k;

    # ── Proxy del API hacia el backend Node.js ────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts generosos para el backend
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Tamaño de buffer suficiente para JWT en Authorization header
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
    }

    # ── Frontend React (SPA — todas las rutas van a index.html) ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Assets estáticos con cache largo ──────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}


